                        let currentLang = localStorage.getItem('language') || 'ru';

                        function t(key) {
                                          return translations[currentLang][key] || key;
                        }

                        function switchLanguage(lang) {
                                          currentLang = lang;
                                          localStorage.setItem('language', lang);
                                          updateTexts();
                        }

                        // Инициализация при загрузке
                        document.addEventListener('DOMContentLoaded', function() {
                                          updateTexts();
                        });
          </script>

          <!-- Добавить CSS для переключателя языков -->
          <style>
                        .language-switcher {
                                          position: fixed;
                                          top: 20px;
                                          right: 20px;
                                          z-index: 1000;
                                          display: flex;
                                          gap: 5px;
                                          background: rgba(0, 0, 0, 0.8);
                                          padding: 8px 12px;
                                          border-radius: 20px;
                                          backdrop-filter: blur(10px);
                        }
                        .language-switcher button {
                                          background: none;
                                          border: none;
                                          padding: 4px 8px;
                                          border-radius: 12px;
                                          cursor: pointer;
                                          transition: all 0.3s;
                                          font-size: 16px;
                                          opacity: 0.6;
                        }
                        .language-switcher button:hover {
                                          opacity: 0.8;
                                          transform: scale(1.1);
                        }
                        .language-switcher button.active {
                                          opacity: 1;
                                          background: rgba(255, 255, 255, 0.2);
                        }
                    </style>
</head>head>

      <body>
                <!-- Переключатель языков -->
                <div class="language-switcher">
                              <button onclick="switchLanguage('ru')" class="active" id="lang-ru">🇷🇺</button>button>
                              <button onclick="switchLanguage('en')" id="lang-en">🇺🇸</button>button>
                              <button onclick="switchLanguage('ua')" id="lang-ua">🇺🇦</button>button>
                </div>div>

                <script>
                              // Обновить функцию switchLanguage для активного класса
                              function switchLanguage(lang) {
                                                currentLang = lang;
                                                localStorage.setItem('language', lang);

                                                // Обновить активную кнопку
                                                document.querySelectorAll('.language-switcher button').forEach(btn => {
                                                                      btn.classList.remove('active');
                                                });
                                                document.getElementById('lang-' + lang).classList.add('active');

                                                updateTexts();
                              }
                </script>
      </body>
          </style>

                        function updateTexts() {
                                          document.querySelectorAll('[data-translate]').forEach(element => {
                                                                const key = element.getAttribute('data-translate');
                                                                element.innerHTML = t(key);
                                          });
                        }
          </script>
          </script>
