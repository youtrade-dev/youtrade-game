<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>YouTrade GAME</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body{margin:0;background:#030712;color:white;font-family:Arial}
    .chart-type-bar{display:flex;gap:4px;margin:8px}
    .chart-type-btn{padding:6px 12px;border-radius:12px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);cursor:pointer;border:none}
    .chart-type-btn.active{background:#5b44d9;color:white}
    #tv-chart{width:100%;height:300px;margin:20px 0}
    </style>
  </head>
  <body>
    <div class="chart-type-bar">
      <div class="chart-type-btn active" data-type="candlestick">Свечи</div>div>
      <div class="chart-type-btn" data-type="bars">Бары</div>div>
    </div>div>
    <div id="tv-chart"></div>div>
    <script>
      var _chart,_candleSeries;
      var data=[
        {time:1703075100,open:1.1050,high:1.1055,low:1.1048,close:1.1052},
        {time:1703075400,open:1.1052,high:1.1058,low:1.1051,close:1.1056}
        ];
      function initChart(){
        var container=document.getElementById("tv-chart");
        if(!container||!LightweightCharts)return;
        container.innerHTML="";
        if(_chart){try{_chart.remove()}catch(e){}_chart=null}
        _chart=LightweightCharts.createChart(container,{
          width:container.offsetWidth,height:300,
          layout:{background:{color:"transparent"},textColor:"#ffffff"},
          grid:{vertLines:{color:"rgba(255,255,255,0.1)"},horzLines:{color:"rgba(255,255,255,0.1)"}},
          rightPriceScale:{borderVisible:false},timeScale:{borderVisible:false}
        });
        var chartType=localStorage.getItem("yt.chartType")||"candlestick";
        if(chartType==="bars"){
          _candleSeries=_chart.addBarSeries({upColor:"#26a69a",downColor:"#ef5350"})
        }else{
          _candleSeries=_chart.addCandlestickSeries({
            upColor:"#26a69a",downColor:"#ef5350",
            borderUpColor:"#26a69a",borderDownColor:"#ef5350",
            wickUpColor:"#26a69a",wickDownColor:"#ef5350"
          })
        }
        _candleSeries.setData(data)
      }
      document.addEventListener("DOMContentLoaded",function(){
        initChart();
        document.querySelectorAll(".chart-type-btn").forEach(function(btn){
          btn.onclick=function(){
            var newType=this.dataset.type;
            localStorage.setItem("yt.chartType",newType);
            document.querySelectorAll(".chart-type-btn").forEach(function(b){b.classList.remove("active")});
            this.classList.add("active");
            initChart()
          }
        })
      });
    </script>
  </body>
</html>
    </script>
  </body>

  </head>
